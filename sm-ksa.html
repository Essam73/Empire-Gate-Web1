<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مكتب سما المملكة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #f7f8fa; font-family: Tahoma, Arial, sans-serif; direction: rtl; }
        .container { max-width: 500px; margin: 70px auto; background: #fff; border-radius: 12px; box-shadow: 0 3px 16px #0001; padding: 42px 30px 36px 30px; text-align: center; }
        h2 { color: #1160aa; margin-bottom: 22px; font-size: 2.1em; }
        .desc { font-size: 1.1em; margin-bottom: 28px; color: #444; line-height: 1.7; }
        .logo {
            font-size: 3.2em;
            background: linear-gradient(90deg,#1160aa 30%,#6cbaff 90%);
            color: #fff;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            margin: 0 auto 18px auto;
            line-height: 70px;
            box-shadow:0 2px 14px #bbddff55;
        }
        .btn {
            display: inline-block; margin-top: 20px; background: #1160aa; color: #fff; padding: 12px 38px; border-radius: 7px; text-decoration: none; font-size: 1.1em; }
        .btn:hover { background: #0f568e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏢</div>
        <h2>مكتب سما المملكة</h2>
        <div class="desc">
            مرحبًا بكم في مكتب سما المملكة للخدمات، <br>
            نحن نقدم حلولاً احترافية في الاستشارات الإدارية والتقنية وتطوير الأعمال، عبر فريق من الخبراء المؤهلين لمساعدتكم.
        </div>
        <a class="btn" href="index.html">العودة للصفحة الرئيسية</a>
    </div>
</body>
</html>
